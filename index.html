    <meta name="theme-color" content="#D4AF37" />

    <meta name="description" content="Discover the real taste of Punjab at Daba Choice, Dubai. Authentic Punjabi cuisine, pure ingredients, chef's specials, Tiffin services, and more in International City." />
    <meta name="keywords" content="Punjabi restaurant Dubai, Daba Choice, authentic Punjabi food International City, North Indian food Dubai, Tiffin service Dubai, Indian restaurant Dubai" />
    
    <!-- Open Graph / Facebook -->

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://dabachoice.com/" />
    <meta property="twitter:title" content="Daba Choice – Authentic Punjabi Restaurant in Dubai" />
    <meta property="twitter:description" content="The real taste of Punjab. Authentic recipes, fresh ingredients, and genuine hospitality in the heart of International City, Dubai." />

    <link rel="icon" type="image/png" href="https://ik.imagekit.io/foodclub/Daba%20Choice/logo/Fresh%20Mango%20Dessert%20Brand%20Logo.png" />
    <link rel="apple-touch-icon" href="https://ik.imagekit.io/foodclub/Daba%20Choice/logo/Fresh%20Mango%20Dessert%20Brand%20Logo.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Restaurant",
        "name": "Daba Choice",
        "image": "https://ik.imagekit.io/foodclub/Daba%20Choice/logo/Fresh%20Mango%20Dessert%20Brand%20Logo.png",
        "url": "https://dabachoice.vercel.app",
        "telephone": "+971504247836",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Y-20, England-Y Street, England Cluster, International City",
          "addressLocality": "Dubai",
          "addressCountry": "AE"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 25.1633,
          "longitude": 55.4026
        },
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": [
            "Monday",
            "Tuesday",
            "Wednesday",
            "Thursday",
            "Friday",
            "Saturday",
            "Sunday"
          ],
          "opens": "08:00",
          "closes": "23:00"
        },
        "servesCuisine": "Punjabi, Indian",
        "priceRange": "AED"
      }
    </script>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("daba-theme");
          if (!raw) {
            document.documentElement.classList.add("dark");
            return;
          }
          var p = JSON.parse(raw);
          var mode = p.state && p.state.mode;
          document.documentElement.classList.toggle("dark", mode !== "light");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
