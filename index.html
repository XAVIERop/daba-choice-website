    <script>
      (function () {
        try {
          var raw = localStorage.getItem("daba-theme");
          if (!raw) {
            document.documentElement.classList.add("dark");
            return;
          }
          var p = JSON.parse(raw);
          var mode = p.state && p.state.mode;
          document.documentElement.classList.toggle("dark", mode !== "light");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>

    <div id="root"></div>

  </body>
